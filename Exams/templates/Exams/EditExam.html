{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ویرایش آزمون</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-yellow: #facc15;
            --text-main: #ffffff;
            --text-dim: #b0b3b8;
            --glass-blur: blur(20px);
            --text-error: #f87171;
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.15);
            --button-shadow: rgba(250, 200, 15, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(157, 80, 187, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 720px;
            backdrop-filter: var(--glass-blur);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .row {
            margin-bottom: 20px;
            text-align: right;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-dim);
            font-weight: 500;
        }

        input[type="text"],
        input[type="datetime-local"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="datetime-local"] {
            background-repeat: no-repeat;
            background-position: 15px center;
            padding-left: 45px;
        }

        .icon-calendar {
            position: absolute;
            right: 15px;
            top: 38px;
            width: 20px;
            height: 20px;
            fill: var(--text-dim);
            transition: fill 0.3s;
        }
        .icon-clock {
             position: absolute;
            right: 15px;
            top: 38px;
            width: 20px;
            height: 20px;
            fill: var(--text-dim);
            transition: fill 0.3s;
        }


        textarea {
            min-height: 120px;
            resize: vertical;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-yellow);
            box-shadow: 0 0 0 3px rgba(250, 200, 15, 0.2);
        }

        .error {
            color: var(--text-error);
            font-size: 0.85rem;
            margin-top: 8px;
            display: block;
            text-align: right;
            height: 1.2em;
        }

        .msg {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            height: 2.4em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .msg.visible {
            opacity: 1;
        }

        .msg.success {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .msg.error {
            background: rgba(248, 113, 113, 0.1);
            color: var(--text-error);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .btn-submit {
            background: linear-gradient(110deg, var(--neon-yellow) 40%, #f9a825 70%, #fbcb00 100%);
            color: var(--bg-color);
            font-weight: 700;
            font-size: 1.1rem;
            padding: 14px 30px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(250, 200, 15, 0.3);
            position: relative;
            overflow: hidden;
            margin-top: 10px;
            width: 100%;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(90deg, rgba(255, 220, 100, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
            z-index: 0;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(250, 200, 15, 0.4);
        }

        .btn-submit:hover::before {
            opacity: 1;
        }

        .btn-submit:active {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(250, 200, 15, 0.3);
        }

        .form-field-wrapper {
            position: relative;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator,
        input[type="datetime-local"]::-webkit-inner-spin-button {
            display: none;
        }

    </style>
</head>
<body>
    <div class="container">
    <h2>ویرایش آزمون: {{ exam.Title }}</h2>

    <form id="editExamForm" method="post">
      {% csrf_token %}

      <div class="row">
        <label for="{{ form.title.id_for_label }}">عنوان</label>
        <div class="form-field-wrapper">
             {{ form.title }}
        </div>
        <div class="error" data-err="title"></div>
      </div>

      <div class="row">
        <label for="{{ form.description.id_for_label }}">توضیحات</label>
        <div class="form-field-wrapper">
            {{ form.description }}
        </div>
        <div class="error" data-err="description"></div>
      </div>

      <div class="row">
        <label for="{{ form.start_date.id_for_label }}">تاریخ شروع</label>
        <div class="form-field-wrapper">
            {{ form.start_date }}
            <svg class="icon-calendar" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19,4H17V2H15V4H9V2H7V4H5C3.93,4 3,4.9 3,6V20C3,21.1 3.9,22 5,22H19c1.1,0 2,-0.9 2,-2V6C21,4.9 20.1,4 19,4Zm-1,16H5V9h14V20Z"/>
                <path d="M5,10H19V20H5Z" opacity="0.4"/>
                <path d="M7,12H9V14H7Z" />
                <path d="M11,12H13V14H11Z" />
                <path d="M15,12H17V14H15Z" />
                <path d="M7,16H9V18H7Z" />
                <path d="M11,16H13V18H11Z" />
                <path d="M15,16H17V18H15Z" />
            </svg>
        </div>
        <div class="error" data-err="start_date"></div>
      </div>

      <div class="row">
        <label for="{{ form.start_time.id_for_label }}">زمان شروع</label>
        <div class="form-field-wrapper">
            {{ form.start_time }}
            <svg class="icon-clock" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12,20a8,8,0,1,1,8-8A8,8,0,0,1,12,20Zm0-14a6,6,0,1,0,6,6A6,6,0,0,0,12,6Z"/>
                <path d="M13,12h-2v-4h2Z"/>
            </svg>
        </div>
        <div class="error" data-err="start_time"></div>
      </div>

      <div class="row">
        <label for="{{ form.end_date.id_for_label }}">تاریخ پایان</label>
        <div class="form-field-wrapper">
            {{ form.end_date }}
            <svg class="icon-calendar" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19,4H17V2H15V4H9V2H7V4H5C3.93,4 3,4.9 3,6V20C3,21.1 3.9,22 5,22H19c1.1,0 2,-0.9 2,-2V6C21,4.9 20.1,4 19,4Zm-1,16H5V9h14V20Z"/>
                <path d="M5,10H19V20H5Z" opacity="0.4"/>
                <path d="M7,12H9V14H7Z" />
                <path d="M11,12H13V14H11Z" />
                <path d="M15,12H17V14H15Z" />
                <path d="M7,16H9V18H7Z" />
                <path d="M11,16H13V18H11Z" />
                <path d="M15,16H17V18H15Z" />
            </svg>
        </div>
        <div class="error" data-err="end_date"></div>
      </div>

      <div class="row">
        <label for="{{ form.end_time.id_for_label }}">زمان پایان</label>
        <div class="form-field-wrapper">
            {{ form.end_time }}
            <svg class="icon-clock" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12,20a8,8,0,1,1,8-8A8,8,0,0,1,12,20Zm0-14a6,6,0,1,0,6,6A6,6,0,0,0,12,6Z"/>
                <path d="M13,12h-2v-4h2Z"/>
            </svg>
        </div>
        <div class="error" data-err="end_time"></div>
      </div>

      <button class="btn-submit" type="submit">ذخیره تغییرات</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const form = document.getElementById('editExamForm');
    const msg = document.getElementById('msg');

    function getFormField(fieldName) {
        const element = form.querySelector(`[name="${fieldName}"]`);
        if (!element) {
            console.error(`Element for field "${fieldName}" not found.`);
            return null;
        }
        return element;
    }

    function toggleIconVisibility(inputElement) {
        const parentWrapper = inputElement.parentElement;
        const calendarIcon = parentWrapper.querySelector('.icon-calendar');
        const clockIcon = parentWrapper.querySelector('.icon-clock');

        if (inputElement.type === 'date' && calendarIcon) {
            calendarIcon.style.display = 'block';
            if (clockIcon) clockIcon.style.display = 'none';
        } else if (inputElement.type === 'time' && clockIcon) {
            clockIcon.style.display = 'block';
            if (calendarIcon) calendarIcon.style.display = 'none';
        } else {
            if (calendarIcon) calendarIcon.style.display = 'none';
            if (clockIcon) clockIcon.style.display = 'none';
        }
    }

    function clearErrors() {
      document.querySelectorAll('[data-err]').forEach(el => el.textContent = '');
      msg.textContent = '';
      msg.classList.remove('visible', 'success', 'error');

      document.querySelectorAll('.icon-calendar, .icon-clock').forEach(icon => icon.style.display = 'none');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const formData = new FormData(form);

      try {
          const res = await fetch(window.location.href, {
            method: 'POST',
            headers: {
              'X-Requested-With': 'XMLHttpRequest',
            },
            body: formData
          });

          let data;
          try {
              data = await res.json();
          } catch (jsonError) {
              if (res.redirected) {
                  window.location.href = res.url;
                  return;
              }
              msg.textContent = 'پاسخ سرور نامعتبر است.';
              msg.classList.add('visible', 'error');
              return;
          }


          if (!res.ok) {
            if (data && data.errors) {
              for (const [field, errors] of Object.entries(data.errors)) {
                const el = document.querySelector(`[data-err="${field}"]`);
                if (el) {
                    el.textContent = errors.join(' ');
                } else {
                    console.warn(`Error element for field "${field}" not found.`);
                }
              }
              msg.textContent = 'فرم دارای خطا است.';
              msg.classList.add('visible', 'error');
            } else {
              msg.textContent = data.message || 'خطای نامشخص رخ داد.';
              msg.classList.add('visible', 'error');
            }
            return;
          }

          msg.textContent = data.message || 'تغییرات با موفقیت ذخیره شد.';
          msg.classList.add('visible', 'success');

          if (data.redirect_url) {
              setTimeout(() => {
                  window.location.href = data.redirect_url;
              }, 1500);
          }
      } catch (error) {
          console.error('Fetch error:', error);
          msg.textContent = 'خطا در ارسال درخواست.';
          msg.classList.add('visible', 'error');
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('input[type="date"], input[type="time"]').forEach(toggleIconVisibility);
    });

    document.querySelectorAll('input[type="date"], input[type="time"]').forEach(input => {
        input.addEventListener('input', () => toggleIconVisibility(input));
    });
  </script>
</body>
</html>
