{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختصاص استاد به کلاس</title>

    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />

    <style>
        :root {
            --bg-1: #050816;
            --bg-2: #0f172a;
            --bg-3: #111827;

            --card-bg: rgba(15, 23, 42, 0.72);
            --card-border: rgba(255, 255, 255, 0.08);

            --neon-blue: #38bdf8;
            --neon-purple: #a855f7;
            --neon-cyan: #22d3ee;
            --neon-green: #22c55e;
            --neon-red: #ef4444;
            --neon-yellow: #facc15; 

            --text-main: #f8fafc;
            --text-soft: #cbd5e1;
            --text-muted: #94a3b8;
            --text-error: #f87171;

            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Vazirmatn', sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top right, rgba(168, 85, 247, 0.18), transparent 28%),
                radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.16), transparent 30%),
                radial-gradient(circle at center, rgba(34, 211, 238, 0.08), transparent 55%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
            background-attachment: fixed;
            direction: rtl;
            text-align: right;
            overflow-x: hidden;
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 36px 18px 48px;
        }

        .container {
            width: 100%;
            max-width: 560px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 40px 32px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.06), transparent 35%, rgba(168, 85, 247, 0.05));
            pointer-events: none;
        }

        .header {
            position: relative;
            z-index: 1;
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.3;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .subtitle {
            margin: 0;
            color: var(--text-soft);
            font-size: 0.98rem;
            line-height: 1.9;
        }

        .course-info-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 20px 0 30px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            backdrop-filter: blur(15px);
        }

        .course-name-display {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--neon-cyan);
            text-align: center;
        }

        .form-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 22px;
            padding: 30px;
            margin-bottom: 28px;
            backdrop-filter: blur(18px);
            text-align: center;
        }

        .form-container h3 {
            margin: 0 0 16px 0;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-purple), #ff74cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .form-fields {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-soft);
            margin-bottom: 10px;
            font-weight: 500;
        }

        input[type="text"], select {
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-radius: 14px;
            font-size: 0.95rem;
            transition: all 0.24s ease;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2214%22%20height%3D%2214%22%20viewBox%3D%220%200%2014%2014%22%3E%3Cpath%20fill%3D%22%23f8fafc%22%20d%3D%22M11.3%204.4%22%2F%3E%3Cpath%20fill%3D%22%23cbd5e1%22%20d%3D%22M7%209.3%20L3.7%206.1%202.3%207.5%207%2011.7%2011.7%207.5%2010.3%206.1z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: left 16px center;
            background-size: 14px 14px;
            padding-right: 44px;
            padding-left: 16px;
            cursor: pointer;
        }

        select option {
            color: var(--text-main);
            background-color: var(--bg-2);
        }

        select option:checked {
            background-color: var(--neon-blue);
            color: var(--text-main);
        }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 30px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--bg-1);
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(250, 204, 21, 0.3),
                        0 0 0 4px rgba(250, 204, 21, 0.1);
            background: linear-gradient(110deg, var(--neon-yellow) 40%, #f9a825 70%, #fbcb00 100%);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(90deg, rgba(250, 204, 21, 0.6) 0%, rgba(255, 255, 255, 0) 100%);
            z-index: 0;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(250, 204, 21, 0.4),
                        0 0 0 6px rgba(250, 204, 21, 0.15);
        }

        .btn-submit:hover::before {
            opacity: 1;
        }

        .btn-submit:active {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(250, 204, 21, 0.3),
                        0 0 0 3px rgba(250, 204, 21, 0.1);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.8;
            text-decoration: none;
            transition: color 0.24s ease;
        }
        .back-link:hover {
            color: var(--neon-blue);
            text-decoration: underline;
        }

        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            h1 { font-size: 1.8rem; }
            .course-info-bar { flex-direction: column; }
            .course-name-display { margin-bottom: 10px; }
            .form-container { padding: 25px; }
            .btn-submit { padding: 14px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="header">
                <h1>اختصاص استاد به کلاس</h1>
                <p class="subtitle">استاد مورد نظر خود را برای تدریس این درس انتخاب کنید.</p>
            </div>

            <div class="course-info-bar">
                <div class="course-name-display">
                    درس: {{ course.CourseName }} (کد: {{ course.CourseCode }})
                </div>
            </div>

            <div class="form-container">
                <h3>انتخاب استاد</h3>
                <form method="post" id="assign-teacher-form">
                    {% csrf_token %}
                    <div class="form-fields">
                        <div class="form-group">
                            <label for="teacher_select">لیست اساتید:</label>
                            <select name="teacher_id" id="teacher_select" required>
                                <option value="" disabled selected>-- استاد را انتخاب کنید --</option>
                                {% for teacher in teachers %}
                                    <option value="{{ teacher.UserKey_id }}">
                                         {{ teacher.UserKey.FirstName }} {{ teacher.UserKey.LastName }}
                                         {% if teacher.UserKey.Username %}
                                            ({{ teacher.UserKey.Username }})
                                         {% endif %}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div>
                            <button type="submit" class="btn-submit">
                                <span>ثبت و تایید</span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <a href="{% url 'EduStaffs:manage_courses' %}" class="back-link">
                ← بازگشت به لیست کلاس‌ها
            </a>
        </div>
    </div>
</body>
</html>
